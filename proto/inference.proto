syntax = "proto3";

package flashqwen;

option go_package = "flashqwen-api/pb";

// The model-side inference service. The Go gateway sends structured chat requests; the C++ engine
// owns everything model-specific (Qwen3 chat template, tokenisation, generation, and tool-call
// detection) and streams back typed events. The gateway has zero model knowledge.
service Inference {
  // One chat request -> a stream of events (text deltas, completed tool calls, then a final Done).
  rpc Generate(GenerateRequest) returns (stream GenerateEvent);
  // Model metadata for /v1/models.
  rpc GetModel(ModelRequest) returns (ModelInfo);
}

message ToolCall {
  string id = 1;
  string name = 2;
  string arguments_json = 3;   // arguments as a JSON object string
}

message Message {
  string role = 1;                 // system | user | assistant | tool
  string content = 2;
  repeated ToolCall tool_calls = 3;  // for assistant turns that called tools
  string tool_call_id = 4;           // for tool-result turns
}

message ToolDef {
  string name = 1;
  string description = 2;
  string parameters_json = 3;   // JSON Schema of the parameters, as a string
}

message GenerateRequest {
  repeated Message messages = 1;
  repeated ToolDef tools = 2;
  int32 max_tokens = 3;
  float temperature = 4;
  float top_p = 5;
  bool  enable_thinking = 6;
}

message Done {
  string finish_reason = 1;     // stop | length | tool_calls
  int32  prompt_tokens = 2;
  int32  completion_tokens = 3;
}

message GenerateEvent {
  oneof event {
    string   text_delta = 1;    // incremental assistant text
    ToolCall tool_call  = 2;    // a fully-parsed tool call
    Done     done       = 3;    // terminal event (always last)
  }
}

message ModelRequest {}
message ModelInfo { string id = 1; }
